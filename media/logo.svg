<svg xmlns="http://www.w3.org/2000/svg" width="720" height="160" viewBox="0 0 720 160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1a0d2e"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="160" rx="16" fill="url(#bg)"/>

  <!-- Waveform bars (audio visualiser) — left side -->
  <!-- Each bar: x, y-from-centre, height -->
  <g fill="url(#wave)" opacity="0.9">
    <rect x="32"  y="68"  width="6" height="24" rx="3"/>
    <rect x="44"  y="56"  width="6" height="48" rx="3"/>
    <rect x="56"  y="48"  width="6" height="64" rx="3"/>
    <rect x="68"  y="38"  width="6" height="84" rx="3"/>
    <rect x="80"  y="50"  width="6" height="60" rx="3"/>
    <rect x="92"  y="60"  width="6" height="40" rx="3"/>
    <rect x="104" y="44"  width="6" height="72" rx="3"/>
    <rect x="116" y="34"  width="6" height="92" rx="3"/>
    <rect x="128" y="44"  width="6" height="72" rx="3"/>
    <rect x="140" y="58"  width="6" height="44" rx="3"/>
    <rect x="152" y="66"  width="6" height="28" rx="3"/>
    <rect x="164" y="52"  width="6" height="56" rx="3"/>
    <rect x="176" y="40"  width="6" height="80" rx="3"/>
    <rect x="188" y="60"  width="6" height="40" rx="3"/>
    <rect x="200" y="70"  width="6" height="20" rx="3"/>
  </g>

  <!-- Main title — single text element so wav2vec2 and .cpp share the same baseline with no gap -->
  <text x="228" y="103"
        font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="56"
        font-weight="700"
        letter-spacing="-1">
    <tspan fill="#f8fafc">wav2vec2</tspan><tspan fill="#7c3aed">.cpp</tspan>
  </text>

  <!-- Tagline -->
  <text x="228" y="130"
        font-family="-apple-system, 'Segoe UI', sans-serif"
        font-size="15"
        fill="#94a3b8"
        letter-spacing="0.5">Fast CPU inference · 100+ languages · No Python required</text>
</svg>
